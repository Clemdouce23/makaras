<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAKARAS — Lieux de vie adaptés</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; height:100vh; display:flex; overflow:hidden; background:#faf7f2; color:#2c2825; }
nav { width:190px; background:#fffef9; border-right:1px solid #e8e0d5; display:flex; flex-direction:column; flex-shrink:0; padding:16px 0; }
.logo { padding:0 16px 20px; font-family:Georgia,serif; font-size:20px; font-weight:bold; }
.logo span { color:#c1607a; font-style:italic; }
.nav-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#7a7068; padding:0 16px 8px; }
.nav-btn { display:flex; align-items:center; gap:10px; padding:10px 16px; background:transparent; border:none; border-left:3px solid transparent; cursor:pointer; text-align:left; width:100%; transition:all .15s; }
.nav-btn:hover { background:#f5f1eb; }
.nav-btn.active { background:#f0ece6; border-left-color:#c1607a; }
.nav-btn .ico { font-size:20px; }
.nav-btn .nav-title { font-size:13px; font-weight:600; color:#2c2825; }
.nav-btn .nav-sub { font-size:10px; color:#7a7068; }
.nav-footer { margin-top:auto; padding:12px 16px; font-size:10px; color:#aaa; line-height:1.6; border-top:1px solid #e8e0d5; }
.sync-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#5a9972; margin-right:4px; vertical-align:middle; }
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { background:#fffef9; border-bottom:1px solid #e8e0d5; padding:8px 16px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; flex-shrink:0; }
.search-wrap { position:relative; flex:1; max-width:280px; }
.search-wrap input { width:100%; padding:6px 12px 6px 32px; border:1.5px solid #e8e0d5; border-radius:50px; font-family:inherit; font-size:12px; background:#faf7f2; outline:none; color:#2c2825; }
.search-ico { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:13px; pointer-events:none; }
.chip { padding:4px 12px; border-radius:50px; border:1.5px solid #e8e0d5; background:#faf7f2; color:#2c2825; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
.chip.active { border-color:transparent; color:#fff; }
.chip-fam.active{background:#c1607a;} .chip-mas.active{background:#5a9972;} .chip-fv.active{background:#4a82b8;}
.chip-fh.active{background:#c87e3a;} .chip-eanm.active{background:#7a5aa8;} .chip-hi.active{background:#b8962a;}
.chip-med.active{background:#2e7fc1;} .chip-psy.active{background:#7c3fc1;}
.chip-gem.active{background:#e07b39;} .chip-asso.active{background:#5a9972;} .chip-apero.active{background:#c1607a;}
.chip-bool.active{background:#2c2825;border-color:#2c2825;color:#fff;}
.filter-select { padding:4px 10px; border-radius:50px; border:1.5px solid #e8e0d5; background:#faf7f2; font-family:inherit; font-size:12px; color:#2c2825; outline:none; cursor:pointer; }
.btn-reset { padding:4px 12px; border-radius:50px; border:1.5px solid #e8e0d5; background:transparent; font-family:inherit; font-size:12px; color:#7a7068; cursor:pointer; margin-left:auto; }
.count-badge { font-size:12px; color:#7a7068; white-space:nowrap; }
.count-badge strong { color:#2c2825; }
.body-wrap { flex:1; display:flex; overflow:hidden; }
.map-wrap { flex:1; position:relative; }
.map-el { width:100%; height:100%; }
.sidebar { width:290px; background:#fffef9; border-left:1px solid #e8e0d5; display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
.sidebar-head { padding:10px 14px; border-bottom:1px solid #e8e0d5; font-size:11px; color:#7a7068; flex-shrink:0; }
.sidebar-list { flex:1; overflow-y:auto; }
.sidebar-list::-webkit-scrollbar{width:3px;} .sidebar-list::-webkit-scrollbar-thumb{background:#e8e0d5;border-radius:2px;}
.card { padding:10px 14px; border-bottom:1px solid #e8e0d5; cursor:pointer; display:flex; gap:10px; align-items:flex-start; transition:background .12s; }
.card:hover{background:#f5f1eb;} .card.active{background:#f0ece6;}
.card-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.card-type { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; margin-bottom:2px; }
.card-name { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card-ville { font-size:11px; color:#7a7068; margin-top:1px; }
.card-tags { display:flex; gap:3px; margin-top:4px; flex-wrap:wrap; }
.tag { font-size:9px; padding:1px 6px; border-radius:20px; font-weight:700; }
.empty { padding:40px 20px; text-align:center; color:#7a7068; }
.empty .emoji { font-size:30px; margin-bottom:10px; }
.detail-panel { display:none; position:absolute; bottom:16px; left:16px; right:306px; background:#fffef9; border:1px solid #e8e0d5; border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,.12); z-index:500; max-height:56%; overflow-y:auto; }
.detail-head { padding:14px 16px 10px; border-bottom:1px solid #e8e0d5; }
.detail-type { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; margin-bottom:3px; }
.detail-name { font-family:Georgia,serif; font-size:18px; color:#2c2825; margin-bottom:3px; line-height:1.2; }
.detail-sub { font-size:12px; color:#7a7068; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px 16px; }
.detail-field label { display:block; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:#7a7068; margin-bottom:2px; }
.detail-field p { font-size:13px; color:#2c2825; font-weight:500; }
.detail-field.full { grid-column:1/-1; }
.detail-pills { display:flex; gap:6px; padding:0 16px 10px; flex-wrap:wrap; }
.pill { font-size:11px; padding:2px 10px; border-radius:20px; font-weight:600; color:#fff; }
.detail-comment { padding:0 16px 12px; }
.detail-comment label { display:block; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:#7a7068; margin-bottom:4px; }
.detail-comment p { font-size:12px; color:#2c2825; line-height:1.5; }
.detail-actions { display:flex; gap:6px; padding:10px 16px 12px; flex-wrap:wrap; border-top:1px solid #e8e0d5; }
.action-btn { padding:6px 12px; border-radius:8px; border:1.5px solid #e8e0d5; background:#faf7f2; font-size:11px; font-weight:600; cursor:pointer; text-decoration:none; color:#2c2825; font-family:inherit; }
.action-btn:hover { background:#e8e0d5; }
.close-btn { position:absolute; top:12px; right:14px; background:none; border:none; font-size:18px; cursor:pointer; color:#7a7068; }
.section { display:none; flex:1; flex-direction:column; overflow:hidden; }
.section.active { display:flex; }
.map-legend { background:#fffef9; border:1px solid #e8e0d5; border-radius:10px; padding:10px 12px; font-size:11px; line-height:1.9; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.legend-title { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#7a7068; margin-bottom:6px; }
.legend-row { display:flex; align-items:center; gap:7px; }
.legend-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }

/* Barre de recherche de zone */
.zone-bar { position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:400; display:flex; gap:0; filter:drop-shadow(0 2px 8px rgba(0,0,0,.12)); }
.zone-input-wrap { position:relative; }
.zone-input-wrap input { width:280px; padding:9px 36px 9px 16px; border:2px solid #e8e0d5; border-right:none; border-radius:50px 0 0 50px; font-family:'DM Sans',sans-serif; font-size:13px; background:#fffef9; outline:none; color:#2c2825; }
.zone-input-wrap input:focus { border-color:#c1607a; }
.zone-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:14px; cursor:pointer; color:#7a7068; display:none; line-height:1; }
.zone-btn { padding:9px 16px; background:#c1607a; border:2px solid #c1607a; border-radius:0 50px 50px 0; color:#fff; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:background .15s; }
.zone-btn:hover { background:#a84e66; border-color:#a84e66; }
.zone-suggestions { position:absolute; top:calc(100% + 6px); left:0; right:0; background:#fffef9; border:1px solid #e8e0d5; border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,.1); overflow:hidden; display:none; }
.zone-suggestion { padding:8px 16px; font-size:13px; cursor:pointer; color:#2c2825; transition:background .1s; }
.zone-suggestion:hover { background:#f0ece6; }

/* Marqueur de zone */
.zone-marker-icon { background:#c1607a; border:3px solid #fff; border-radius:50%; width:18px; height:18px; box-shadow:0 2px 8px rgba(0,0,0,.3); animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(193,96,122,.4);} 50%{box-shadow:0 0 0 10px rgba(193,96,122,0);} }
/* Loading */
#loading { position:fixed; inset:0; background:#faf7f2; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; gap:14px; transition:opacity .4s; }
#loading.hidden { opacity:0; pointer-events:none; }
.spinner { width:36px; height:36px; border:3px solid #e8e0d5; border-top-color:#c1607a; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin{to{transform:rotate(360deg)}}
#loading-text { font-size:13px; color:#7a7068; }
</style>
</head>
<body>

<div id="loading">
  <div style="font-family:Georgia,serif;font-size:24px;font-weight:bold">MAKA<span style="color:#c1607a;font-style:italic">RAS</span></div>
  <div class="spinner"></div>
  <div id="loading-text">Chargement des données…</div>
</div>

<nav>
  <div class="logo">MAKA<span>RAS</span></div>
  <div class="nav-label">Cartes</div>
  <button class="nav-btn active" onclick="switchSection('hebergements',this)">
    <span class="ico">🏠</span>
    <div><div class="nav-title">Hébergements</div><div class="nav-sub">FAM, MAS, FV…</div></div>
  </button>
  <button class="nav-btn" onclick="switchSection('medecins',this)">
    <span class="ico">🩺</span>
    <div><div class="nav-title">Médecins</div><div class="nav-sub">Psychiatres, Généralistes</div></div>
  </button>
  <button class="nav-btn" onclick="switchSection('psychologues',this)">
    <span class="ico">🧠</span>
    <div><div class="nav-title">Psychologues</div><div class="nav-sub">Cliniciens, Neuro…</div></div>
  </button>
  <button class="nav-btn" onclick="switchSection('associatif',this)">
    <span class="ico">🤝</span>
    <div><div class="nav-title">Associatif</div><div class="nav-sub">GEM, Associations, Apéro café</div></div>
  </button>
  <div class="nav-footer">
    <span class="sync-dot"></span>Synchro Google Sheets<br>
    <span id="last-update" style="color:#bbb;font-size:9px"></span>
  </div>
</nav>

<div id="main">
  <!-- HÉBERGEMENTS -->
  <div id="sec-hebergements" class="section active">
    <div class="topbar">
      <div class="search-wrap"><span class="search-ico">🔍</span><input id="h-search" placeholder="Nom ou ville…" oninput="renderH()"></div>
      <button class="chip chip-fam active" data-type="FAM" onclick="toggleHType(this)">FAM</button>
      <button class="chip chip-mas active" data-type="MAS" onclick="toggleHType(this)">MAS</button>
      <button class="chip chip-fv  active" data-type="FV"  onclick="toggleHType(this)">FV</button>
      <button class="chip chip-fh  active" data-type="FH"  onclick="toggleHType(this)">FH</button>
      <button class="chip chip-eanm active" data-type="EANM" onclick="toggleHType(this)">EANM</button>
      <button class="chip chip-hi  active" data-type="HI"  onclick="toggleHType(this)">HI</button>
      <select class="filter-select" id="h-dept" onchange="renderH()"><option value="">Tous dép.</option></select>
      <button class="chip chip-bool" id="h-tsa"  onclick="toggleBool('h-tsa',renderH)">🧩 TSA/TED</button>
      <button class="chip chip-bool" id="h-snoe" onclick="toggleBool('h-snoe',renderH)">💆 Snoezelen</button>
      <button class="btn-reset" onclick="resetH()">↺ Reset</button>
      <span class="count-badge"><strong id="h-count">0</strong> établissements</span>
    </div>
    <div class="body-wrap">
      <div class="map-wrap">
        <div id="map-h" class="map-el"></div>
        <div id="detail-h" class="detail-panel"></div>
        <div class="zone-bar">
          <div class="zone-input-wrap">
            <input type="text" id="zone-h" placeholder="📍 Zoomer sur une ville, un quartier…" oninput="onZoneInput('h')" onkeydown="if(event.key==='Enter')searchZone('h')">
            <button class="zone-clear" id="zone-clear-h" onclick="clearZone('h')">✕</button>
            <div class="zone-suggestions" id="zone-sugg-h"></div>
          </div>
          <button class="zone-btn" onclick="searchZone('h')">Rechercher</button>
        </div>
      </div>
      <div class="sidebar">
        <div class="sidebar-head" id="h-sidebar-head">Chargement…</div>
        <div class="sidebar-list" id="h-sidebar-list"></div>
      </div>
    </div>
  </div>

  <!-- MÉDECINS -->
  <div id="sec-medecins" class="section">
    <div class="topbar">
      <div class="search-wrap"><span class="search-ico">🔍</span><input id="m-search" placeholder="Nom ou ville…" oninput="renderM()"></div>
      <select class="filter-select" id="m-dept" onchange="renderM()"><option value="">Tous dép.</option></select>
      <button class="chip chip-bool" id="m-tdah" onclick="toggleBool('m-tdah',renderM)">⚡ TDAH</button>
      <button class="chip chip-bool" id="m-di"   onclick="toggleBool('m-di',renderM)">🧩 DI</button>

      <button class="chip chip-bool" id="m-m37"  onclick="toggleBool('m-m37',renderM)">📋 M37</button>
      <button class="chip chip-bool" id="m-visio" onclick="toggleBool('m-visio',renderM)">💻 Visio</button>
      <button class="btn-reset" onclick="resetM()">↺ Reset</button>
      <span class="count-badge"><strong id="m-count">0</strong> médecins</span>

    <div class="body-wrap">

        <div id="map-m" class="map-el"></div>

        <div class="zone-bar">
          <div class="zone-input-wrap">

            <button class="zone-clear" id="zone-clear-m" onclick="clearZone('m')">✕</button>
            <div class="zone-suggestions" id="zone-sugg-m"></div>
          </div>
          <button class="zone-btn" onclick="searchZone('m')">Rechercher</button>
        </div>

      <div class="sidebar">
        <div class="sidebar-head" id="m-sidebar-head">Chargement…</div>
        <div class="sidebar-list" id="m-sidebar-list"></div>
      </div>
    </div>
  </div>

  <!-- PSYCHOLOGUES -->
  <div id="sec-psychologues" class="section">
    <div class="topbar">
      <div class="search-wrap"><span class="search-ico">🔍</span><input id="p-search" placeholder="Nom ou ville…" oninput="renderP()"></div>
      <select class="filter-select" id="p-dept" onchange="renderP()"><option value="">Tous dép.</option></select>
      <button class="chip chip-bool" id="p-tdah"  onclick="toggleBool('p-tdah',renderP)">⚡ TDAH</button>
      <button class="chip chip-bool" id="p-di"    onclick="toggleBool('p-di',renderP)">🧩 DI</button>

    <div class="body-wrap">
      <div class="map-wrap">
        <div id="map-p" class="map-el"></div>
        <div id="detail-p" class="detail-panel"></div>
        <div class="zone-bar">
          <div class="zone-input-wrap">
            <input type="text" id="zone-p" placeholder="📍 Zoomer sur une ville, un quartier…" oninput="onZoneInput('p')" onkeydown="if(event.key==='Enter')searchZone('p')">

      </div>
      <div class="sidebar">
        <div class="sidebar-head" id="p-sidebar-head">Chargement…</div>
        <div class="sidebar-list" id="p-sidebar-list"></div>
      </div>
    </div>
  </div>

  <!-- ASSOCIATIF -->
  <div id="sec-associatif" class="section">
    <div class="topbar">
      <div class="search-wrap"><span class="search-ico">🔍</span><input id="a-search" placeholder="Nom ou ville…" oninput="renderA()"></div>
      <button class="chip chip-gem active"   data-atype="GEM"         onclick="toggleAType(this)">🧩 GEM</button>

    <div class="body-wrap">
      <div class="map-wrap">
        <div id="map-a" class="map-el"></div>

        <div class="zone-bar">
          <div class="zone-input-wrap">

          </div>
          <button class="zone-btn" onclick="searchZone('a')">Rechercher</button>
        </div>

      <div class="sidebar">
        <div class="sidebar-head" id="a-sidebar-head">Chargement…</div>
        <div class="sidebar-list" id="a-sidebar-list"></div>
      </div>
    </div>

// CSV PARSER
// ══════════════════════════════════════════════════════
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = splitLine(lines[0]).map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const vals = splitLine(line).map(v=>v.trim().replace(/^"|"$/g,''));
    const obj={}; headers.forEach((h,i)=>obj[h]=vals[i]||''); return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}
function splitLine(line) {
  const res=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===','&&!inQ){res.push(cur);cur='';}
    else cur+=line[i];
  }
  res.push(cur); return res;
}
function yes(v){ return v&&v.toLowerCase()!=='non'&&v.toLowerCase()!=='nc'&&v!==''; }

// Cherche les coords dans COORDS par le nom, ou dans les colonnes LAT/LNG du CSV
function getCoords(row, nomKey) {
  const nom = (row[nomKey]||'').trim();
  // Priorité 1 : colonnes LAT/LNG dans le Sheet
  const lat = parseFloat(row['LAT']||row['Lat']||row['lat']||'');
  const lng = parseFloat(row['LNG']||row['Lng']||row['lng']||row['LON']||row['Lon']||'');
  if(!isNaN(lat)&&!isNaN(lng)&&lat!==0) return {lat,lng};
  // Priorité 2 : table COORDS
  if(COORDS[nom]) return COORDS[nom];
  // Priorité 3 : cherche correspondance partielle
  for(const key of Object.keys(COORDS)){
    if(nom.toLowerCase().includes(key.toLowerCase())||key.toLowerCase().includes(nom.toLowerCase())) return COORDS[key];
  }
  return null;
}

    PSYCHOS_DATA = rowsP.map(r=>{

      if(!coords) return null;

        type:r['TYPE']||'', genre:r['Genre']||'',
        nom:r['NOM']||'', ville:r['Ville']||'', cp:r['Code postal']||'', dpt:r['Dpt']||'',

function makeIcon(fill,dark) {
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
    <path d="M13 0C5.82 0 0 5.82 0 13c0 8.85 13 21 13 21S26 21.85 26 13C26 5.82 20.18 0 13 0z" fill="${fill}" stroke="${dark}" stroke-width="2"/>
    <circle cx="13" cy="13" r="5" fill="${dark}"/></svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-34]});
}
function addLegend(map,items) {
  const ctrl=L.control({position:'bottomright'});
  ctrl.onAdd=()=>{
    const d=L.DomUtil.create('div','map-legend');
    d.innerHTML=`<div class="legend-title">Légende</div>`+items.map(([l,f,dk])=>`<div class="legend-row"><div class="legend-dot" style="background:${f};border:2px solid ${dk}"></div>${l}</div>`).join('');
    return d;
  };
  ctrl.addTo(map);
}
function initMaps() {
  mapH=L.map('map-h',{zoomControl:true}).setView([43.45,5.2],9);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(mapH);
  addLegend(mapH,Object.entries(HC).map(([k,v])=>[k,v.fill,v.dark]));
  HEBERG.forEach((e,i)=>{
    const c=HC[e.type]||{fill:'#ccc',dark:'#888'};
    const m=L.marker([e.lat,e.lng],{icon:makeIcon(c.fill,c.dark)}).addTo(mapH);
    m.on('click',()=>selectH(i)); hMarkers[i]=m;
