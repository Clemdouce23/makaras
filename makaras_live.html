<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAKARAS — Lieux de vie adaptés</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; height:100vh; display:flex; overflow:hidden; background:#faf7f2; color:#2c2825; }

nav { width:190px; background:#fffef9; border-right:1px solid #e8e0d5; display:flex; flex-direction:column; flex-shrink:0; padding:16px 0; }
.logo { padding:0 16px 20px; font-family:Georgia,serif; font-size:20px; font-weight:bold; }
.logo span { color:#c1607a; font-style:italic; }
.nav-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#7a7068; padding:0 16px 8px; }
.nav-btn { display:flex; align-items:center; gap:10px; padding:10px 16px; background:transparent; border:none; border-left:3px solid transparent; cursor:pointer; text-align:left; width:100%; transition:all .15s; }
.nav-btn:hover { background:#f5f1eb; }
.nav-btn.active { background:#f0ece6; border-left-color:#c1607a; }
.nav-btn .ico { font-size:20px; }
.nav-btn .nav-title { font-size:13px; font-weight:600; color:#2c2825; }
.nav-btn .nav-sub { font-size:10px; color:#7a7068; }
.nav-footer { margin-top:auto; padding:12px 16px; font-size:10px; color:#aaa; line-height:1.5; }
.sync-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#5a9972; margin-right:4px; }

#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { background:#fffef9; border-bottom:1px solid #e8e0d5; padding:8px 16px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; flex-shrink:0; }
.search-wrap { position:relative; flex:1; max-width:280px; }
.search-wrap input { width:100%; padding:6px 12px 6px 32px; border:1.5px solid #e8e0d5; border-radius:50px; font-family:inherit; font-size:12px; background:#faf7f2; outline:none; color:#2c2825; }
.search-ico { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:13px; pointer-events:none; }
.chip { padding:4px 12px; border-radius:50px; border:1.5px solid #e8e0d5; background:#faf7f2; color:#2c2825; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
.chip.active { border-color:transparent; color:#fff; }
.chip-fam.active{background:#c1607a;} .chip-mas.active{background:#5a9972;} .chip-fv.active{background:#4a82b8;}
.chip-fh.active{background:#c87e3a;} .chip-eanm.active{background:#7a5aa8;} .chip-hi.active{background:#b8962a;}
.chip-med.active{background:#2e7fc1;} .chip-psy.active{background:#7c3fc1;}
.chip-bool.active{background:#2c2825;border-color:#2c2825;color:#fff;}
.filter-select { padding:4px 10px; border-radius:50px; border:1.5px solid #e8e0d5; background:#faf7f2; font-family:inherit; font-size:12px; color:#2c2825; outline:none; cursor:pointer; }
.btn-reset { padding:4px 12px; border-radius:50px; border:1.5px solid #e8e0d5; background:transparent; font-family:inherit; font-size:12px; color:#7a7068; cursor:pointer; margin-left:auto; }
.count-badge { font-size:12px; color:#7a7068; white-space:nowrap; }
.count-badge strong { color:#2c2825; }

.body-wrap { flex:1; display:flex; overflow:hidden; }
.sidebar { width:290px; background:#fffef9; border-left:1px solid #e8e0d5; display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
.sidebar-head { padding:10px 14px; border-bottom:1px solid #e8e0d5; font-size:11px; color:#7a7068; flex-shrink:0; }
.sidebar-list { flex:1; overflow-y:auto; }
.sidebar-list::-webkit-scrollbar{width:3px;} .sidebar-list::-webkit-scrollbar-thumb{background:#e8e0d5;border-radius:2px;}
.card { padding:10px 14px; border-bottom:1px solid #e8e0d5; cursor:pointer; display:flex; gap:10px; align-items:flex-start; transition:background .12s; }
.card:hover{background:#f5f1eb;} .card.active{background:#f0ece6;}
.card-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.card-type { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; margin-bottom:2px; }
.card-name { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card-ville { font-size:11px; color:#7a7068; margin-top:1px; }
.card-tags { display:flex; gap:3px; margin-top:4px; flex-wrap:wrap; }
.tag { font-size:9px; padding:1px 6px; border-radius:20px; font-weight:700; }
.empty { padding:40px 20px; text-align:center; color:#7a7068; }
.empty .emoji { font-size:30px; margin-bottom:10px; }

/* Loading overlay */
#loading { position:fixed; inset:0; background:#faf7f2; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; gap:16px; }
#loading.hidden { display:none; }
.spinner { width:40px; height:40px; border:3px solid #e8e0d5; border-top-color:#c1607a; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
#loading-text { font-size:14px; color:#7a7068; }
#loading-bar-wrap { width:280px; height:4px; background:#e8e0d5; border-radius:2px; overflow:hidden; }
#loading-bar { height:100%; background:#c1607a; border-radius:2px; transition:width .3s; width:0%; }

/* Detail panel */
.detail-panel { display:none; position:absolute; bottom:16px; left:16px; right:306px; background:#fffef9; border:1px solid #e8e0d5; border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,.12); z-index:500; max-height:56%; overflow-y:auto; }
.detail-head { padding:14px 16px 10px; border-bottom:1px solid #e8e0d5; }
.detail-type { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; margin-bottom:3px; }
.detail-name { font-family:Georgia,serif; font-size:18px; color:#2c2825; margin-bottom:3px; line-height:1.2; }
.detail-sub { font-size:12px; color:#7a7068; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px 16px; }
.detail-field label { display:block; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:#7a7068; margin-bottom:2px; }
.detail-field p { font-size:13px; color:#2c2825; font-weight:500; }
.detail-field.full { grid-column:1/-1; }
.detail-pills { display:flex; gap:6px; padding:0 16px 10px; flex-wrap:wrap; }
.pill { font-size:11px; padding:2px 10px; border-radius:20px; font-weight:600; color:#fff; }
.detail-comment { padding:0 16px 12px; }
.detail-comment label { display:block; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:#7a7068; margin-bottom:4px; }
.detail-comment p { font-size:12px; color:#2c2825; line-height:1.5; }
.detail-actions { display:flex; gap:6px; padding:10px 16px 12px; flex-wrap:wrap; border-top:1px solid #e8e0d5; }
.action-btn { padding:6px 12px; border-radius:8px; border:1.5px solid #e8e0d5; background:#faf7f2; font-size:11px; font-weight:600; cursor:pointer; text-decoration:none; color:#2c2825; font-family:inherit; }
.action-btn:hover { background:#e8e0d5; }
.close-btn { position:absolute; top:12px; right:14px; background:none; border:none; font-size:18px; cursor:pointer; color:#7a7068; }
.section { display:none; flex:1; flex-direction:column; overflow:hidden; }
.section.active { display:flex; }
.map-wrap { flex:1; position:relative; }
.map-el { width:100%; height:100%; }
.map-legend { background:#fffef9; border:1px solid #e8e0d5; border-radius:10px; padding:10px 12px; font-size:11px; line-height:1.9; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.legend-title { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#7a7068; margin-bottom:6px; }
.legend-row { display:flex; align-items:center; gap:7px; }
.legend-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div style="font-family:Georgia,serif;font-size:24px;font-weight:bold;color:#2c2825">MAKA<span style="color:#c1607a;font-style:italic">RAS</span></div>
  <div class="spinner"></div>
  <div id="loading-text">Chargement des données…</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<!-- NAV -->
<nav>
  <div class="logo">MAKA<span>RAS</span></div>
  <div class="nav-label">Cartes</div>
  <button class="nav-btn active" onclick="switchSection('hebergements',this)">
    <span class="ico">🏠</span>
    <div><div class="nav-title">Hébergements</div><div class="nav-sub">FAM, MAS, FV…</div></div>
  </button>
  <button class="nav-btn" onclick="switchSection('liberal',this)">
    <span class="ico">🩺</span>
    <div><div class="nav-title">Réseau libéral</div><div class="nav-sub">Médecins & Psy</div></div>
  </button>
  <div class="nav-footer">
    <span class="sync-dot"></span>Données synchronisées avec Google Sheets<br>
    <span id="last-update" style="color:#bbb"></span>
  </div>
</nav>

<!-- MAIN -->
<div id="main">

  <!-- HÉBERGEMENTS -->
  <div id="sec-hebergements" class="section active">
    <div class="topbar">
      <div class="search-wrap"><span class="search-ico">🔍</span><input id="h-search" placeholder="Nom ou ville…" oninput="renderH()"></div>
      <button class="chip chip-fam active" data-type="FAM" onclick="toggleHType(this)">FAM</button>
      <button class="chip chip-mas active" data-type="MAS" onclick="toggleHType(this)">MAS</button>
      <button class="chip chip-fv  active" data-type="FV"  onclick="toggleHType(this)">FV</button>
      <button class="chip chip-fh  active" data-type="FH"  onclick="toggleHType(this)">FH</button>
      <button class="chip chip-eanm active" data-type="EANM" onclick="toggleHType(this)">EANM</button>
      <button class="chip chip-hi  active" data-type="HI"  onclick="toggleHType(this)">HI</button>
      <select class="filter-select" id="h-dept" onchange="renderH()"><option value="">Tous dép.</option></select>
      <button class="chip chip-bool" id="h-tsa"  onclick="toggleBool('h-tsa',renderH)">🧩 TSA/TED</button>
      <button class="chip chip-bool" id="h-snoe" onclick="toggleBool('h-snoe',renderH)">💆 Snoezelen</button>
      <button class="btn-reset" onclick="resetH()">↺ Reset</button>
      <span class="count-badge"><strong id="h-count">0</strong> établissements</span>
    </div>
    <div class="body-wrap">
      <div class="map-wrap">
        <div id="map-h" class="map-el"></div>
        <div id="detail-h" class="detail-panel"></div>
      </div>
      <div class="sidebar">
        <div class="sidebar-head" id="h-sidebar-head">Chargement…</div>
        <div class="sidebar-list" id="h-sidebar-list"></div>
      </div>
    </div>
  </div>

  <!-- RÉSEAU LIBÉRAL -->
  <div id="sec-liberal" class="section">
    <div class="topbar">
      <div class="search-wrap"><span class="search-ico">🔍</span><input id="l-search" placeholder="Nom ou ville…" oninput="renderL()"></div>
      <button class="chip chip-med active" data-cat="medecin" onclick="toggleLCat(this)">🩺 Médecins</button>
      <button class="chip chip-psy active" data-cat="psy"     onclick="toggleLCat(this)">🧠 Psychologues</button>
      <select class="filter-select" id="l-dept" onchange="renderL()"><option value="">Tous dép.</option></select>
      <button class="chip chip-bool" id="l-tsa"  onclick="toggleBool('l-tsa',renderL)">🧩 TSA/TED</button>
      <button class="chip chip-bool" id="l-tdah" onclick="toggleBool('l-tdah',renderL)">⚡ TDAH</button>
      <button class="chip chip-bool" id="l-visio" onclick="toggleBool('l-visio',renderL)">💻 Visio</button>
      <button class="btn-reset" onclick="resetL()">↺ Reset</button>
      <span class="count-badge"><strong id="l-count">0</strong> praticiens</span>
    </div>
    <div class="body-wrap">
      <div class="map-wrap">
        <div id="map-l" class="map-el"></div>
        <div id="detail-l" class="detail-panel"></div>
      </div>
      <div class="sidebar">
        <div class="sidebar-head" id="l-sidebar-head">Chargement…</div>
        <div class="sidebar-list" id="l-sidebar-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG — URLs des Google Sheets CSV
// ═══════════════════════════════════════
const CSV_HEBERG = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNMNWUvEs8lca8a0rLbjAt4SywTQaAtxCI4Ro8xOOGvbkSP0SfApPrhcophOaXUcj1vp3brD5TrXHP/pub?gid=0&single=true&output=csv';
const CSV_MEDECIN = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNMNWUvEs8lca8a0rLbjAt4SywTQaAtxCI4Ro8xOOGvbkSP0SfApPrhcophOaXUcj1vp3brD5TrXHP/pub?gid=821861970&single=true&output=csv';
const CSV_PSY = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNMNWUvEs8lca8a0rLbjAt4SywTQaAtxCI4Ro8xOOGvbkSP0SfApPrhcophOaXUcj1vp3brD5TrXHP/pub?gid=1839868908&single=true&output=csv';

// ═══════════════════════════════════════
// COULEURS
// ═══════════════════════════════════════
const HC = {
  FAM:{fill:'#f4a7b9',dark:'#c1607a'}, MAS:{fill:'#a8d5ba',dark:'#5a9972'},
  FV: {fill:'#aec6e8',dark:'#4a82b8'}, FH: {fill:'#f7c89b',dark:'#c87e3a'},
  EANM:{fill:'#c3b1e1',dark:'#7a5aa8'},HI: {fill:'#f9e4b7',dark:'#b8962a'},
};
const LC = {
  medecin:{fill:'#b8d8f0',dark:'#2e7fc1'},
  psy:    {fill:'#d4b8f0',dark:'#7c3fc1'},
};

// ═══════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════
let HEBERG = [], LIBERAL = [];
const state = {
  hTypes: new Set(['FAM','MAS','FV','FH','EANM','HI']),
  lCats:  new Set(['medecin','psy']),
  hSel: null, lSel: null,
};

// ═══════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = splitCSVLine(lines[0]).map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line).map(v => v.trim().replace(/^"|"$/g,''));
    const obj = {};
    headers.forEach((h,i) => obj[h] = vals[i] || '');
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function splitCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i=0; i<line.length; i++) {
    if (line[i]==='"') { inQ=!inQ; }
    else if (line[i]===',' && !inQ) { result.push(cur); cur=''; }
    else cur += line[i];
  }
  result.push(cur); return result;
}

// ═══════════════════════════════════════
// GÉOCODAGE (cache local)
// ═══════════════════════════════════════
const geoCache = {};

async function geocode(adresse) {
  if (geoCache[adresse]) return geoCache[adresse];
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(adresse)}&limit=1&countrycodes=fr`;
    const r = await fetch(url, {headers:{'Accept-Language':'fr'}});
    const data = await r.json();
    if (data && data[0]) {
      const coords = {lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon)};
      geoCache[adresse] = coords;
      return coords;
    }
  } catch(e) {}
  return null;
}

// ═══════════════════════════════════════
// CHARGEMENT
// ═══════════════════════════════════════
function setProgress(pct, text) {
  document.getElementById('loading-bar').style.width = pct+'%';
  document.getElementById('loading-text').textContent = text;
}

async function loadAll() {
  try {
    setProgress(5, 'Chargement des hébergements…');
    const [csvH, csvM, csvP] = await Promise.all([
      fetch(CSV_HEBERG).then(r=>r.text()),
      fetch(CSV_MEDECIN).then(r=>r.text()),
      fetch(CSV_PSY).then(r=>r.text()),
    ]);
    setProgress(25, 'Analyse des données…');

    const rowsH = parseCSV(csvH);
    const rowsM = parseCSV(csvM);
    const rowsP = parseCSV(csvP);

    setProgress(30, 'Géocodage des adresses…');

    // Géocoder hébergements
    let done = 0;
    for (const row of rowsH) {
      const addr = row['ADRESSE COMPLETE'] || row['Adresse'] || '';
      if (addr) {
        const coords = await geocode(addr);
        if (coords) { row._lat = coords.lat; row._lng = coords.lng; }
      }
      done++;
      setProgress(30 + Math.round((done / rowsH.length) * 30), `Géocodage hébergements… (${done}/${rowsH.length})`);
    }

    setProgress(60, 'Géocodage du réseau libéral…');
    done = 0;
    const allPros = [...rowsM, ...rowsP];
    for (const row of allPros) {
      const addr = row['ADRESSE COMPLETE'] || row['Adresse'] || '';
      if (addr) {
        const coords = await geocode(addr);
        if (coords) { row._lat = coords.lat; row._lng = coords.lng; }
      }
      done++;
      setProgress(60 + Math.round((done / allPros.length) * 30), `Géocodage praticiens… (${done}/${allPros.length})`);
    }

    setProgress(90, 'Construction des cartes…');

    // Normaliser
    HEBERG = rowsH.filter(r => r._lat).map(r => ({
      type:      r['TYPE'] || '',
      nom:       r['NOM'] || '',
      asso:      r['ASSO GEST'] || '',
      ville:     r['Ville'] || '',
      cp:        r['Code postal'] || '',
      dpt:       r['Dpt'] || '',
      population:r['Population'] || '',
      tsa:       r['Spécifique TSA/TED'] || r['Spécifique TSA/TE'] || '',
      age:       r['Critère age'] || r['Critère âge'] || '',
      placeP:    r['Place P'] || r['Places permanentes'] || '',
      placeAT:   r['Place AT'] || r['Places temporaires'] || '',
      placeAJ:   r['Place AJ'] || r['Place acc jour'] || '',
      snoezelen: r['Snoezelen'] || '',
      annee:     r['Année ouverture'] || '',
      tel:       r['Telephone'] || '',
      mail:      r['Mail'] || '',
      site:      r['Site'] || '',
      commentaire: r['Commentaire'] || '',
      lat: r._lat, lng: r._lng,
    }));

    LIBERAL = [
      ...rowsM.filter(r => r._lat).map(r => ({
        cat:'medecin',
        type: r['TYPE'] || '', genre: r['Genre'] || '',
        nom:  r['NOM'] || '', ville: r['Ville'] || '',
        cp:   r['Code postal'] || '', dpt: r['Dpt'] || '',
        tel:  r['Telephone'] || '', mail: r['Mail'] || '', site: r['Site'] || '',
        tsa:  yes(r['TSA'] || r['Tout TED']),
        tdah: yes(r['TDAH']), di: yes(r['DI']),
        tca:  yes(r['TCA']), sexo: yes(r['Séxologie'] || r['Sexologie']),
        visio: r['Visio ?'] || r['Visio?'] || '',
        commentaire: r['Commentaire'] || '',
        lat: r._lat, lng: r._lng,
      })),
      ...rowsP.filter(r => r._lat).map(r => ({
        cat:'psy',
        type: r['TYPE'] || '', genre: r['Genre'] || '',
        nom:  r['NOM'] || '', ville: r['Ville'] || '',
        cp:   r['Code postal'] || '', dpt: r['Dpt'] || '',
        tel:  r['Telephone'] || '', mail: r['Mail'] || '', site: r['Site'] || '',
        tsa:  yes(r['TSA'] || r['Tout TED']),
        tdah: yes(r['TDAH']), di: yes(r['DI']),
        tca:  yes(r['TCA']),
        visio: r['Visio ?'] || r['Visio?'] || '',
        tarif: r['Tarif'] || '',
        commentaire: r['Commentaire'] || '',
        lat: r._lat, lng: r._lng,
      })),
    ];

    // Remplir selects département
    fillDeptSelect('h-dept', HEBERG);
    fillDeptSelect('l-dept', LIBERAL);

    setProgress(100, 'Prêt !');
    initMaps();
    renderH(); renderL();

    document.getElementById('last-update').textContent = 'Mis à jour : ' + new Date().toLocaleTimeString('fr-FR');
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);

  } catch(err) {
    document.getElementById('loading-text').textContent = '⚠️ Erreur de chargement. Vérifiez votre connexion.';
    console.error(err);
  }
}

function yes(v) { return v && v.toLowerCase() !== 'non' && v.toLowerCase() !== 'nc' && v !== '' && v !== 'Non'; }

function fillDeptSelect(id, data) {
  const sel = document.getElementById(id);
  const depts = [...new Set(data.map(e=>e.dpt).filter(Boolean))].sort();
  depts.forEach(d => { const o=document.createElement('option'); o.value=d; o.textContent=`Dép. ${d}`; sel.appendChild(o); });
}

// ═══════════════════════════════════════
// MAPS
// ═══════════════════════════════════════
let mapH, mapL;
const hMarkers = {}, lMarkers = {};

function makeIcon(fill, dark) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
    <path d="M13 0C5.82 0 0 5.82 0 13c0 8.85 13 21 13 21S26 21.85 26 13C26 5.82 20.18 0 13 0z" fill="${fill}" stroke="${dark}" stroke-width="2"/>
    <circle cx="13" cy="13" r="5" fill="${dark}"/>
  </svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-34]});
}

function addLegend(map, items) {
  const ctrl = L.control({position:'bottomright'});
  ctrl.onAdd = () => {
    const d = L.DomUtil.create('div','map-legend');
    d.innerHTML = `<div class="legend-title">Légende</div>` +
      items.map(([l,f,dk]) => `<div class="legend-row"><div class="legend-dot" style="background:${f};border:2px solid ${dk}"></div>${l}</div>`).join('');
    return d;
  };
  ctrl.addTo(map);
}

function initMaps() {
  mapH = L.map('map-h',{zoomControl:true}).setView([43.45,5.2],9);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(mapH);
  addLegend(mapH, Object.entries(HC).map(([k,v])=>[k,v.fill,v.dark]));

  HEBERG.forEach((e,i) => {
    const c = HC[e.type]||{fill:'#ccc',dark:'#888'};
    const m = L.marker([e.lat,e.lng],{icon:makeIcon(c.fill,c.dark)}).addTo(mapH);
    m.on('click',()=>selectH(i));
    hMarkers[i]=m;
  });

  mapL = L.map('map-l',{zoomControl:true}).setView([43.7,5.8],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(mapL);
  addLegend(mapL,[['Médecin',LC.medecin.fill,LC.medecin.dark],['Psychologue',LC.psy.fill,LC.psy.dark]]);

  LIBERAL.forEach((e,i) => {
    const c = LC[e.cat]||{fill:'#ccc',dark:'#888'};
    const m = L.marker([e.lat,e.lng],{icon:makeIcon(c.fill,c.dark)}).addTo(mapL);
    m.on('click',()=>selectL(i));
    lMarkers[i]=m;
  });
}

// ═══════════════════════════════════════
// NAV
// ═══════════════════════════════════════
function switchSection(id, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  btn.classList.add('active');
  setTimeout(()=>{ if(id==='hebergements') mapH&&mapH.invalidateSize(); else mapL&&mapL.invalidateSize(); },50);
}

function toggleBool(id, cb) {
  const btn=document.getElementById(id);
  const a = btn.dataset.active!=='true';
  btn.dataset.active=a; btn.classList.toggle('active',a); cb();
}

// ═══════════════════════════════════════
// HÉBERGEMENTS
// ═══════════════════════════════════════
function toggleHType(btn) {
  const t=btn.dataset.type; btn.classList.toggle('active');
  state.hTypes.has(t)?state.hTypes.delete(t):state.hTypes.add(t); renderH();
}
function resetH() {
  state.hTypes=new Set(['FAM','MAS','FV','FH','EANM','HI']); state.hSel=null;
  document.getElementById('h-search').value=''; document.getElementById('h-dept').value='';
  document.querySelectorAll('#sec-hebergements .chip[data-type]').forEach(b=>b.classList.add('active'));
  ['h-tsa','h-snoe'].forEach(id=>{const b=document.getElementById(id);b.classList.remove('active');b.dataset.active='false';});
  document.getElementById('detail-h').style.display='none'; renderH();
}
function filterH() {
  const q=document.getElementById('h-search').value.toLowerCase();
  const dept=document.getElementById('h-dept').value;
  const tsa=document.getElementById('h-tsa').dataset.active==='true';
  const snoe=document.getElementById('h-snoe').dataset.active==='true';
  return HEBERG.filter(e => {
    if(!state.hTypes.has(e.type)) return false;
    if(dept && e.dpt!==dept) return false;
    if(tsa && !yes(e.tsa)) return false;
    if(snoe && e.snoezelen.toLowerCase()!=='oui') return false;
    if(q && !e.nom.toLowerCase().includes(q) && !e.ville.toLowerCase().includes(q)) return false;
    return true;
  });
}
function renderH() {
  const vis=filterH();
  const visSet=new Set(vis.map(e=>HEBERG.indexOf(e)));
  document.getElementById('h-count').textContent=vis.length;
  Object.entries(hMarkers).forEach(([i,m])=>{
    visSet.has(Number(i))?(mapH.hasLayer(m)||m.addTo(mapH)):(mapH.hasLayer(m)&&mapH.removeLayer(m));
  });
  document.getElementById('h-sidebar-head').textContent=`${vis.length} établissement${vis.length!==1?'s':''} affiché${vis.length!==1?'s':''}`;
  const list=document.getElementById('h-sidebar-list');
  if(!vis.length){list.innerHTML=`<div class="empty"><div class="emoji">🔍</div><p>Aucun résultat</p></div>`;return;}
  list.innerHTML=vis.map(e=>{
    const i=HEBERG.indexOf(e); const c=HC[e.type]||{fill:'#ccc',dark:'#888'};
    const tags=[];
    if(yes(e.tsa)) tags.push(`<span class="tag" style="background:${c.fill};color:${c.dark}">TSA</span>`);
    if(e.snoezelen.toLowerCase()==='oui') tags.push(`<span class="tag" style="background:#ede7f6;color:#7a5aa8">Snoezelen</span>`);
    return `<div class="card${state.hSel===i?' active':''}" onclick="selectH(${i})" id="hcard-${i}">
      <div class="card-dot" style="background:${c.fill};border:2px solid ${c.dark}"></div>
      <div style="flex:1;min-width:0">
        <div class="card-type" style="color:${c.dark}">${e.type}</div>
        <div class="card-name">${e.nom}</div>
        <div class="card-ville">📍 ${e.ville}</div>
        ${tags.length?`<div class="card-tags">${tags.join('')}</div>`:''}
      </div></div>`;
  }).join('');
}
function selectH(i) {
  state.hSel=i; const e=HEBERG[i]; const c=HC[e.type]||{fill:'#ccc',dark:'#888'};
  mapH.flyTo([e.lat,e.lng],13,{duration:.8});
  document.querySelectorAll('#h-sidebar-list .card').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById('hcard-'+i);
  if(card){card.classList.add('active');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
  const specs=[];
  if(yes(e.tsa)) specs.push(`<span class="pill" style="background:#c1607a">🧩 TSA/TED</span>`);
  if(e.snoezelen.toLowerCase()==='oui') specs.push(`<span class="pill" style="background:#7a5aa8">💆 Snoezelen</span>`);
  const actions=[];
  if(e.tel) actions.push(`<a class="action-btn" href="tel:${e.tel}">📞 ${e.tel}</a>`);
  if(e.mail) actions.push(`<a class="action-btn" href="mailto:${e.mail}">✉️ Mail</a>`);
  if(e.site) actions.push(`<a class="action-btn" href="${e.site}" target="_blank">🌐 Site</a>`);
  const det=document.getElementById('detail-h');
  det.style.display='block';
  det.innerHTML=`
    <button class="close-btn" onclick="document.getElementById('detail-h').style.display='none'">✕</button>
    <div class="detail-head" style="border-top:4px solid ${c.dark}">
      <div class="detail-type" style="color:${c.dark}">${e.type}</div>
      <div class="detail-name">${e.nom}</div>
      <div class="detail-sub">${e.asso}</div>
    </div>
    <div class="detail-grid">
      <div class="detail-field"><label>Public</label><p>${e.population||'—'}</p></div>
      <div class="detail-field"><label>Âge</label><p>${e.age||'—'}</p></div>
      <div class="detail-field"><label>Ouverture</label><p>${e.annee||'—'}</p></div>
      <div class="detail-field"><label>Places perm.</label><p>${e.placeP||'—'}</p></div>
      <div class="detail-field"><label>Places temp.</label><p>${e.placeAT||'—'}</p></div>
      <div class="detail-field full"><label>Ville</label><p>${e.ville} (${e.cp})</p></div>
    </div>
    ${specs.length?`<div class="detail-pills">${specs.join('')}</div>`:''}
    ${e.commentaire?`<div class="detail-comment"><label>Commentaire</label><p>${e.commentaire}</p></div>`:''}
    ${actions.length?`<div class="detail-actions">${actions.join('')}</div>`:''}`;
}

// RÉSEAU LIBÉRAL

function toggleLCat(btn) {
  const t=btn.dataset.cat; btn.classList.toggle('active');
  state.lCats.has(t)?state.lCats.delete(t):state.lCats.add(t); renderL();
}
function resetL() {
  state.lCats=new Set(['medecin','psy']); state.lSel=null;
  document.getElementById('l-search').value=''; document.getElementById('l-dept').value='';
  document.querySelectorAll('#sec-liberal .chip[data-cat]').forEach(b=>b.classList.add('active'));
  ['l-tsa','l-tdah','l-visio'].forEach(id=>{const b=document.getElementById(id);b.classList.remove('active');b.dataset.active='false';});
  document.getElementById('detail-l').style.display='none'; renderL();
}
function filterL() {
  const q=document.getElementById('l-search').value.toLowerCase();
  const dept=document.getElementById('l-dept').value;
  const tsa=document.getElementById('l-tsa').dataset.active==='true';
  const tdah=document.getElementById('l-tdah').dataset.active==='true';
  const visio=document.getElementById('l-visio').dataset.active==='true';
  return LIBERAL.filter(e=>{
    if(!state.lCats.has(e.cat)) return false;
    if(dept && e.dpt!==dept) return false;
    if(tsa && !e.tsa) return false;
    if(tdah && !e.tdah) return false;
    if(visio && e.visio.toLowerCase()!=='oui') return false;
    if(q && !e.nom.toLowerCase().includes(q) && !e.ville.toLowerCase().includes(q)) return false;
    return true;
  });
}
function renderL() {
  const vis=filterL();
  const visSet=new Set(vis.map(e=>LIBERAL.indexOf(e)));
  document.getElementById('l-count').textContent=vis.length;
  Object.entries(lMarkers).forEach(([i,m])=>{
    visSet.has(Number(i))?(mapL.hasLayer(m)||m.addTo(mapL)):(mapL.hasLayer(m)&&mapL.removeLayer(m));
  });
  document.getElementById('l-sidebar-head').textContent=`${vis.length} praticien${vis.length!==1?'s':''}`;
  const list=document.getElementById('l-sidebar-list');
  if(!vis.length){list.innerHTML=`<div class="empty"><div class="emoji">🔍</div><p>Aucun résultat</p></div>`;return;}
  list.innerHTML=vis.map(e=>{
    const i=LIBERAL.indexOf(e); const c=LC[e.cat]||{fill:'#ccc',dark:'#888'};
    const tags=[];
    if(e.tsa) tags.push(`<span class="tag" style="background:${c.fill};color:${c.dark}">TSA</span>`);
    if(e.tdah) tags.push(`<span class="tag" style="background:${c.fill};color:${c.dark}">TDAH</span>`);
    if(e.visio&&e.visio.toLowerCase()==='oui') tags.push(`<span class="tag" style="background:#e8f4e8;color:#3a7a3a">Visio</span>`);
    return `<div class="card${state.lSel===i?' active':''}" onclick="selectL(${i})" id="lcard-${i}">
      <div class="card-dot" style="background:${c.fill};border:2px solid ${c.dark}"></div>
      <div style="flex:1;min-width:0">
        <div class="card-type" style="color:${c.dark}">${e.type}</div>
        <div class="card-name">${e.nom}</div>
        <div class="card-ville">📍 ${e.ville} · dép. ${e.dpt}</div>
        ${tags.length?`<div class="card-tags">${tags.join('')}</div>`:''}
      </div></div>`;
  }).join('');
}
function selectL(i) {
  state.lSel=i; const e=LIBERAL[i]; const c=LC[e.cat]||{fill:'#ccc',dark:'#888'};
  mapL.flyTo([e.lat,e.lng],13,{duration:.8});
  document.querySelectorAll('#l-sidebar-list .card').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById('lcard-'+i);

  const specs=[];
  if(e.tsa)  specs.push(`<span class="pill" style="background:#c1607a">🧩 TSA/TED</span>`);
  if(e.tdah) specs.push(`<span class="pill" style="background:#e07b39">⚡ TDAH</span>`);
  if(e.di)   specs.push(`<span class="pill" style="background:#5a9972">🧩 DI</span>`);

  if(e.visio&&e.visio.toLowerCase()==='oui') specs.push(`<span class="pill" style="background:#3a7a3a">💻 Visio</span>`);
  const actions=[];
  if(e.tel) actions.push(`<a class="action-btn" href="tel:${e.tel}">📞 ${e.tel}</a>`);
  if(e.mail) actions.push(`<a class="action-btn" href="mailto:${e.mail}">✉️ Mail</a>`);
  if(e.site) actions.push(`<a class="action-btn" href="${e.site}" target="_blank">🌐 Doctolib / Site</a>`);
  const det=document.getElementById('detail-l');
  det.style.display='block';
  det.innerHTML=`
    <button class="close-btn" onclick="document.getElementById('detail-l').style.display='none'">✕</button>
    <div class="detail-head" style="border-top:4px solid ${c.dark}">
      <div class="detail-type" style="color:${c.dark}">${e.type} · ${e.genre}</div>
      <div class="detail-name">${e.nom}</div>
      <div class="detail-sub">📍 ${e.ville} (${e.cp}) — Dép. ${e.dpt}</div>
    </div>
    <div class="detail-grid">
      ${e.tarif?`<div class="detail-field full"><label>Tarifs</label><p>${e.tarif}</p></div>`:''}

    ${actions.length?`<div class="detail-actions">${actions.join('')}</div>`:''}`;
